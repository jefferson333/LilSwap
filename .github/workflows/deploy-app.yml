name: Deploy App (Frontend)

on:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          VITE_REOWN_PROJECT_ID: ${{ secrets.VITE_REOWN_PROJECT_ID }}
          VITE_ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
        run: |
          cp .env.example .env
          sed -i "s/REOWN_PROJECT_ID_HERE/${VITE_REOWN_PROJECT_ID}/g" .env
          sed -i "s/ALCHEMY_API_KEY_HERE/${VITE_ALCHEMY_API_KEY}/g" .env
          pnpm build

      - name: Set Release Version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Remote to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.REMOTE_PORT }} ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts

      - name: Upload and Extract via Tar over SSH
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ROOT="${{ secrets.REMOTE_APP_ROOT }}"
          TARGET="$ROOT/releases/$TAG"
          
          # Create target directory and stream tar content
          ssh -p ${{ secrets.REMOTE_PORT }} ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} "mkdir -p $TARGET"
          tar czf - -C dist . | ssh -p ${{ secrets.REMOTE_PORT }} ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} "tar xzf - -C $TARGET"

      - name: Atomic Symlink Swap
        run: |
          ROOT="${{ secrets.REMOTE_APP_ROOT }}"
          TAG="${{ steps.version.outputs.tag }}"
          ssh -p ${{ secrets.REMOTE_PORT }} ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} "
            ln -sfn $ROOT/releases/$TAG $ROOT/current &&
            cd $ROOT/releases && ls -1dt v* | tail -n +4 | xargs rm -rf
          "
