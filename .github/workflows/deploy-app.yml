name: Deploy App (Laravel + Frontend)

on:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      APP_TAG: ${{ github.ref_name }}
      APP_ROOT: ${{ secrets.REMOTE_APP_ROOT }}
      APP_REPO: ${{ github.repository }}
      G_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Secrets exatamente como no arquivo enviado
      REOWN_PROJECT_ID: ${{ secrets.VITE_REOWN_PROJECT_ID }}
      ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
      API_SECRET: ${{ secrets.API_SECRET }}
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Remote to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.REMOTE_PORT }} ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts

      - name: Clone and Build on Server
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.REMOTE_PORT }} ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} "
            # Definindo as variáveis no remoto de forma segura
            TAG='$APP_TAG'
            ROOT='$APP_ROOT'
            REPO='$APP_REPO'
            TOKEN='$G_TOKEN'

            REOWN_ID='$REOWN_PROJECT_ID'
            ALCHEMY_KEY='$ALCHEMY_API_KEY'
            API_SEC='$API_SECRET'

            TARGET=\"\$ROOT/releases/\$TAG\"

            echo \"Deploying \$TAG to \$TARGET...\"

            # 1. Clone
            git clone --branch \$TAG --depth 1 https://x-access-token:\$TOKEN@github.com/\$REPO.git \$TARGET

            cd \$TARGET
            git remote remove origin

            # 2. Structure
            mkdir -p \$ROOT/shared/storage/framework/{cache/data,sessions,testing,views}
            mkdir -p \$ROOT/shared/storage/{app/public,logs}
            mkdir -p \$ROOT/shared/database
            touch \$ROOT/shared/database/database.sqlite
            chmod -R 775 \$ROOT/shared/storage

            # Links
            rm -rf storage
            ln -sfn \$ROOT/shared/storage storage
            mkdir -p database
            ln -sfn \$ROOT/shared/database/database.sqlite database/database.sqlite

            # 3. Setup .env (Usando os nomes EXATOS fornecidos)
            cp .env.example .env
            sed -i \"s|^VITE_REOWN_PROJECT_ID=.*|VITE_REOWN_PROJECT_ID=\$REOWN_ID|g\" .env
            sed -i \"s|^ALCHEMY_API_KEY=.*|ALCHEMY_API_KEY=\$ALCHEMY_KEY|g\" .env
            sed -i \"s|^API_SECRET=.*|API_SECRET=\$API_SEC|g\" .env
            sed -i \"s|DB_DATABASE=.*|DB_DATABASE=\$ROOT/shared/database/database.sqlite|g\" .env

            # 4. Hostinger Node Path
            NODE_BIN=\"/opt/alt/alt-nodejs22/root/bin\"
            export PATH=\"\$NODE_BIN:\$PATH\"

            # 5. Build
            composer install --no-dev --optimize-autoloader
            php artisan key:generate --force
            php artisan migrate --force
            \$NODE_BIN/corepack pnpm install --frozen-lockfile
            \$NODE_BIN/corepack pnpm build

            # 6. Finalize
            php artisan optimize:clear
            php artisan storage:link

            pkill -u \$(whoami) node || true
          "

      - name: Atomic Symlink Swap
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.REMOTE_PORT }} ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} "
            ROOT='$APP_ROOT'
            TAG='$APP_TAG'
            ln -sfn \$ROOT/releases/\$TAG/public \$ROOT/current &&
            cd \$ROOT/releases && ls -1dt v* | tail -n +4 | xargs rm -rf
          "
